# DurgasAI stack: Postgres + backend + Redis + Chroma + Ollama (no Supabase).
#
# EC2 / production: only backend publishes host port 8000. db/redis/ollama/chromadb
# are reachable on durgasai_network only (do not set *_PUBLISH_HOST to a public EIP —
# AWS public IPs are not on the instance NIC and Docker bind will fail).
# For host port access locally, use compose.dev.yaml or docker-compose.dev.yml.

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - durgasai_network
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # One worker: lifespan init (Chroma/RAG/LLM) runs once; four workers caused slow starts and curl resets on small EC2.
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - '8000'
      - --workers
      - '1'
    ports:
      - '8000:8000'
    env_file:
      - ../.env
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://postgres:Koushik121@54.146.221.133:5432/postgres
      - POSTGRESQL_URL=postgresql+asyncpg://postgres:Koushik121@54.146.221.133:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS=true
      - OLLAMA_BASE_URL=http://ollama:11434/api
      - OLLAMA_MODE=localhost
      # Avoid loading sentence-transformers/torch on small EC2; use Compose Ollama for embeddings.
      - EMBEDDING_PROVIDER=ollama
      - EMBEDDING_MODEL=nomic-embed-text
      - SKIP_HEAVY_STARTUP_INIT=true
    volumes:
      - backend_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - durgasai_network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - durgasai_network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - durgasai_network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - durgasai_network
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma

networks:
  durgasai_network:
    driver: bridge

volumes:
  postgres_data:
  backend_data:
  redis_data:
  ollama_data:
  chroma_data:
