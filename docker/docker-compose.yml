# DurgasAI / DurgasOS full-stack service stack.
#
# Services: PostgreSQL, Redis, ChromaDB, Kafka (KRaft), MinIO, Ollama,
#           Prometheus, Grafana, Kafka-UI, pgAdmin, backend.
#
# Local dev: docker compose -f docker/docker-compose.yml up -d
# Production: only backend publishes host port 8000; set *_EXTERNAL_PORT=0
#             to suppress host-port bindings for internal services.

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - durgasai_network
    restart: unless-stopped
    ports:
      - '${POSTGRES_EXTERNAL_PORT:-5432}:5432'

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - '8000'
      - --workers
      - '1'
    ports:
      - '8000:8000'
    env_file:
      - ../.env
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      - POSTGRESQL_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS=true
      - OLLAMA_BASE_URL=http://ollama:11434/api
      - OLLAMA_MODE=localhost
      - EMBEDDING_PROVIDER=ollama
      - EMBEDDING_MODEL=nomic-embed-text
      - SKIP_HEAVY_STARTUP_INIT=true
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CHROMA_SERVER_URL=http://chromadb:8000
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=false
    volumes:
      - backend_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - durgasai_network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - durgasai_network
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1 --loglevel warning
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '${REDIS_EXTERNAL_PORT:-6379}:6379'

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - durgasai_network
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - durgasai_network
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - '${CHROMA_EXTERNAL_PORT:-8001}:8000'

  kafka:
    image: bitnami/kafka:3.7
    networks:
      - durgasai_network
    restart: unless-stopped
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_NUM_PARTITIONS=3
      - KAFKA_CFG_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_CFG_LOG_RETENTION_HOURS=168
      - KAFKA_CFG_LOG_SEGMENT_BYTES=1073741824
    volumes:
      - kafka_data:/bitnami/kafka
    ports:
      - '${KAFKA_EXTERNAL_PORT:-9092}:9092'
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    networks:
      - durgasai_network
    restart: unless-stopped
    environment:
      - KAFKA_CLUSTERS_0_NAME=durgasos-local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    ports:
      - '${KAFKA_UI_PORT:-8080}:8080'
    depends_on:
      kafka:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    networks:
      - durgasai_network
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  prometheus:
    image: prom/prometheus:latest
    networks:
      - durgasai_network
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'

  grafana:
    image: grafana/grafana:latest
    networks:
      - durgasai_network
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-durgasos}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - '${GRAFANA_PORT:-3001}:3000'
    depends_on:
      - prometheus

  pgadmin:
    image: dpage/pgadmin4:latest
    networks:
      - durgasai_network
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@durgasos.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-durgasos}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    depends_on:
      db:
        condition: service_healthy

networks:
  durgasai_network:
    driver: bridge

volumes:
  postgres_data:
  backend_data:
  redis_data:
  ollama_data:
  chroma_data:
  kafka_data:
  minio_data:
  prometheus_data:
  grafana_data:
  pgadmin_data:
