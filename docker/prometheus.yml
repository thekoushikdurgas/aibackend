global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'durgasos'

scrape_configs:
  - job_name: 'durgasos-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'
    scheme: http

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
