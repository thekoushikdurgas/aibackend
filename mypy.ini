[mypy]
python_version = 3.13
plugins = pydantic.mypy
ignore_missing_imports = False
warn_unused_configs = True
show_error_codes = True

[pydantic-mypy]
init_forbid_extra = False
init_typed = True
warn_required_dynamic_aliases = False

# Strawberry multi-inheritance root types (mixin pattern).
[mypy-app.graphql.schema]
disable_error_code = misc

# Large legacy schema module: Field(...) patterns trigger noisy overload matching with mypy+pydantic.
[mypy-app.models.schemas]
disable_error_code = call-overload

# Third-party packages without complete stubs in this repo.
[mypy-chromadb.*]
ignore_missing_imports = True

[mypy-sentence_transformers.*]
ignore_missing_imports = True

[mypy-strawberry.*]
ignore_missing_imports = True

[mypy-imageio_ffmpeg.*]
ignore_missing_imports = True

[mypy-zstandard.*]
ignore_missing_imports = True

[mypy-pyarrow.*]
ignore_missing_imports = True

