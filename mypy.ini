[mypy]
python_version = 3.13
plugins = pydantic.mypy
ignore_missing_imports = True
warn_unused_configs = True
show_error_codes = True

[pydantic-mypy]
init_forbid_extra = False
init_typed = True
warn_required_dynamic_aliases = False

# Large legacy schema module: Field(...) patterns trigger noisy overload matching with mypy+pydantic.
[mypy-app.models.schemas]
disable_error_code = call-overload

# Staged: third-party stubs, JSON-RPC dynamic params, and provider-specific httpx patterns.
# Prefer fixing types inline over time; these patterns are low signal for runtime bugs.
[mypy-app.services.llm.*]
ignore_errors = True
[mypy-app.api.ws_methods.*]
ignore_errors = True
[mypy-app.services.nvidia.*]
ignore_errors = True
[mypy-app.services.openrouter.*]
ignore_errors = True
[mypy-app.services.fal.*]
ignore_errors = True
[mypy-app.services.hyperbolic.*]
ignore_errors = True
[mypy-app.services.cohere.*]
ignore_errors = True
[mypy-app.agents.*]
ignore_errors = True
[mypy-app.services.rag.*]
ignore_errors = True
[mypy-app.services.gemini.*]
ignore_errors = True
[mypy-app.services.reka.*]
ignore_errors = True
[mypy-app.services.multimodal.*]
ignore_errors = True
[mypy-app.services.ai21.library]
