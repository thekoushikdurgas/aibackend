# Alembic Configuration File

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path prepend
prepend_sys_path = .

# Timezone used when rendering timestamps
timezone = UTC

# Truncate the slug field at this amount
truncate_slug_length = 40

# Set to true to run the environment during the 'revision' command
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without source
sourceless = false

# Version path separator
version_path_separator = os

# Output encoding used when writing file
output_encoding = utf-8

# SQLAlchemy URL (overridden in env.py)
sqlalchemy.url = sqlite:///./data/durgasai.db


[post_write_hooks]
# Post write hooks
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
