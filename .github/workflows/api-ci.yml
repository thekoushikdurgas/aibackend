# CI for DurgasAI Backend (FastAPI + Strawberry GraphQL + WebSocket JSON-RPC).
# Repo root = ai.backend (standalone). Monorepo: set defaults.run.working-directory to ai.backend.

name: API CI

on:
  push:
    branches: [main, develop, 'feature/**']
    paths:
      - 'app/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'alembic.ini'
      - 'alembic/**'
      - 'pytest.ini'
      - 'docker/**'
      - 'docs/**'
      - 'compose.yaml'
      - 'compose.dev.yaml'
      - 'package.json'
      - 'package-lock.json'
      - '.prettierrc.json'
      - '.prettierignore'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'alembic.ini'
      - 'alembic/**'
      - 'pytest.ini'
      - 'docker/**'
      - 'docs/**'
      - 'compose.yaml'
      - 'compose.dev.yaml'
      - 'package.json'
      - 'package-lock.json'
      - '.prettierrc.json'
      - '.prettierignore'
      - '.github/workflows/api-ci.yml'

defaults:
  run:
    working-directory: .

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/ scripts/ tests/ --output-format=github

      - name: Format check (black)
        run: black --check app/ scripts/ tests/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS tooling (Prettier)
        run: npm ci

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Type check (mypy)
        run: mypy app/

      - name: Optional best-practices check
        if: ${{ hashFiles('scripts/check_best_practices.py') != '' }}
        run: |
          mkdir -p reports
          python scripts/check_best_practices.py \
            --format json \
            --output reports/ci_check_report.json \
            --no-fail
        continue-on-error: true

      - name: Stub best-practices report if missing
        if: always()
        run: |
          mkdir -p reports
          if [ ! -s reports/ci_check_report.json ]; then
            echo '{"skipped":true,"reason":"best_practices_script_absent_or_skipped"}' > reports/ci_check_report.json
          fi

      - name: Upload best-practices report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-best-practices-report
          path: reports/ci_check_report.json
          if-no-files-found: ignore
          retention-days: 30

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/testdb
      POSTGRESQL_URL: postgresql+asyncpg://test:test@localhost:5432/testdb
      SECRET_KEY: ci-test-secret-key-not-for-production
      JWT_SECRET_KEY: ci-test-jwt-secret-not-for-production
      ENVIRONMENT: test
      DEBUG: 'false'
      PYTHONPATH: ${{ github.workspace }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # config.json is gitignored; app.config loads it at import time (see get_settings).
      - name: Prepare CI config
        run: cp -f config/config.example.json config/config.json

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage-report
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14
