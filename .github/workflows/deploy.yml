# Deploy backend Docker stack on EC2 after API CI passes on main, or via workflow_dispatch.
#
# Secrets (GitHub → Settings → Secrets and variables → Actions):
#   EC2_HOST, EC2_USER, EC2_SSH_KEY — SSH access
#   ENV_FILE — full contents of ai.backend/.env on the server, including at least:
#              POSTGRES_PASSWORD (Compose db service interpolation),
#              JWT_SECRET_KEY, API_KEY.
#              Optional: STORAGE_*, SOCKETIO_*, provider keys (see .env.example).
#              Compose overrides DATABASE_URL / POSTGRESQL_URL / REDIS_URL inside the container.
#
# Repository variables (Settings → Secrets and variables → Actions → Variables):
#   EC2_REPO_ROOT — git clone root on the server (default below if unset)
#   DEPLOY_SUBDIR — e.g. ai.backend when the repo is a monorepo (default empty = clone root is backend)
#   VERIFY_SLEEP_SECONDS — seconds to wait before health checks (optional)
#   VERIFY_STRICT_READY — set to 1 to fail deploy if GraphQL systemReady is not_ready (optional)
#   VERIFY_REQUIRE_DOCKER — set to 1 to fail verify when docker is missing (default 0 = skip verify)
#   SKIP_VALIDATE_DEPLOY — set to 1 to skip python validate_env in remote-deploy.sh (not recommended)
#   SKIP_COMPOSE_VERSION_CHECK — set to 1 on the server to silence Compose v2.20+ include: warnings
#
# EC2 host setup: deploy/EC2.md and deploy/GITHUB_SECRETS.md
#
# Optional: EC2_SSH_KEY_PASSPHRASE for encrypted keys (extend appleboy/ssh-action if needed).
#
# Requires Docker Compose v2.20+ on the host (root compose.yaml uses include:).

name: Deploy API to EC2

on:
  workflow_run:
    workflows: [API CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Deploy and verify via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          envs: ENV_FILE_CONTENT
          script: |
            set -euo pipefail
            export VERIFY_SLEEP_SECONDS="${{ vars.VERIFY_SLEEP_SECONDS }}"
            export VERIFY_STRICT_READY="${{ vars.VERIFY_STRICT_READY }}"
            export VERIFY_REQUIRE_DOCKER="${{ vars.VERIFY_REQUIRE_DOCKER }}"
            export SKIP_VALIDATE_DEPLOY="${{ vars.SKIP_VALIDATE_DEPLOY }}"
            export SKIP_COMPOSE_VERSION_CHECK="${{ vars.SKIP_COMPOSE_VERSION_CHECK }}"

            REPO_ROOT="${{ vars.EC2_REPO_ROOT }}"
            REPO_ROOT="${REPO_ROOT:-/home/ubuntu/aibackend}"
            SUB="${{ vars.DEPLOY_SUBDIR }}"
            SUB="${SUB:-}"

            BACKEND_DIR="$REPO_ROOT"
            if [ -n "$SUB" ]; then BACKEND_DIR="$REPO_ROOT/$SUB"; fi

            cd "$REPO_ROOT"
            git fetch origin main
            git reset --hard origin/main

            mkdir -p "$BACKEND_DIR"
            cd "$BACKEND_DIR"
            sudo chmod 600 .env
            # Env passthrough avoids bash expanding ${…} inside the secret body (would break with set -u).
            printf '%s\n' "${ENV_FILE_CONTENT:-}" > .env
            sudo chmod 600 .env || true

            bash deploy/remote-deploy.sh
            bash deploy/verify-stack.sh
